services:
  # CLI mode (interactive chat)
  buddy:
    build: .
    container_name: personal-buddy
    env_file: .env
    volumes:
      - buddy-data:/data/memory
      - ./credentials.json:/data/credentials.json:ro
    stdin_open: true
    tty: true

  # Telegram bot mode
  telegram:
    build: .
    container_name: personal-buddy-telegram
    env_file: .env
    volumes:
      - buddy-data:/data/memory
      - ./credentials.json:/data/credentials.json:ro
    command: ["python", "telegram_bot.py"]
    restart: unless-stopped

  # Web UI mode
  web:
    build: .
    container_name: personal-buddy-web
    env_file: .env
    volumes:
      - buddy-data:/data/memory
      - ./credentials.json:/data/credentials.json:ro
    command: ["python", "web.py"]
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  buddy-data:
